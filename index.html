<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-huda Knowledge Competition System</title>
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; 
            background-color: #1a202c; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        iframe { border: none; width: 100%; height: 100%; display: none; }
        
        #preloader {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #1a202c; display: none; flex-direction: column; justify-content: center;
            align-items: center; z-index: 9999; transition: opacity 0.5s ease;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1); border-left-color: #ffc107;
            border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 30px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #mobile-fallback {
            display: none; background: #dc2626; color: white; border: none; padding: 15px 30px;
            font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); animation: fadeIn 0.5s; text-align: center;
            margin-top: 20px;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .mobile-loading-text {
            color: white; font-size: 20px; font-weight: bold; text-align: center; display: none;
        }

        #login-wrapper {
            display: flex; justify-content: center; align-items: center; height: 100vh;
            width: 100vw; background-color: #cbd5e1; position: absolute; top: 0; left: 0; z-index: 10000;
        }
        .login-box {
            background: #ffffff; padding: 40px; border-radius: 16px; box-shadow: 0 12px 30px rgba(0,0,0,0.3);
            width: 90%; max-width: 400px; text-align: center; border-top: 6px solid #0a2540; box-sizing: border-box;
        }
        .login-box h2 { color: #0a2540; margin-top: 0; margin-bottom: 25px; font-size: 28px; font-weight: 800; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-weight: bold; margin-bottom: 8px; color: #111827; font-size: 14px; }
        .input-group input { width: 100%; padding: 12px; border: 2px solid #cbd5e1; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .input-group input:focus { outline: none; border-color: #ffc107; }
        .login-btn {
            background-color: #ffc107; color: #000000; border: none; padding: 14px; width: 100%;
            font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.15); margin-top: 10px;
        }
        .error-msg { color: #dc2626; margin-top: 15px; font-weight: bold; display: none; }

        /* MOBILE LOGIN TWEAKS */
        @media (max-width: 480px) {
            .login-box { padding: 25px; }
            .login-box h2 { font-size: 24px; }
            .login-btn { padding: 12px; font-size: 16px; }
        }
    </style>
</head>
<body>

    <div id="login-wrapper">
        <form class="login-box" onsubmit="attemptLogin(event)">
            <h2>System Login</h2>
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" required autocomplete="off">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="login-btn">Secure Login</button>
            <div class="error-msg" id="error-msg">Incorrect username or password.</div>
        </form>
    </div>

    <div id="preloader">
        <div class="spinner"></div>
        <div id="mobile-loading-text" class="mobile-loading-text">Redirecting to Secure Mobile App...</div>
        <button id="mobile-fallback" onclick="loadDirectMobile()">App taking too long? Tap here to load manually</button>
    </div>

    <iframe id="appFrame" src="about:blank" sandbox="allow-scripts allow-same-origin allow-forms allow-popups" allow="fullscreen" allowfullscreen="true" webkitallowfullscreen="true" mozallowfullscreen="true"></iframe>

    <script>
        const webAppUrl = 'https://script.google.com/macros/s/AKfycbxy5ektlMzFSJvqumAF6ov5oG7TCmrQ6s8afFr242RpbHuMm9-rK2sjVqG91oKiffR-/exec';
        
        const iframe = document.getElementById('appFrame');
        const preloader = document.getElementById('preloader');
        const loginWrapper = document.getElementById('login-wrapper');
        const errorMsg = document.getElementById('error-msg');
        const mobileFallback = document.getElementById('mobile-fallback');
        const mobileLoadingText = document.getElementById('mobile-loading-text');
        
        let loadTimeout;

        window.onload = () => {
            if(localStorage.getItem('alhuda_user')) document.getElementById('username').value = localStorage.getItem('alhuda_user');
            if(localStorage.getItem('alhuda_pass')) document.getElementById('password').value = localStorage.getItem('alhuda_pass');

            if (localStorage.getItem('alhuda_logged_in') === 'true') {
                startSystemLoad();
            }
        };

        function attemptLogin(event) {
            event.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if (user === 'alhuda' && pass === 'alhuda143') {
                localStorage.setItem('alhuda_logged_in', 'true');
                localStorage.setItem('alhuda_user', user);
                localStorage.setItem('alhuda_pass', pass);
                startSystemLoad();
            } else {
                errorMsg.style.display = 'block';
            }
        }

        function startSystemLoad() {
            loginWrapper.style.display = 'none';
            preloader.style.display = 'flex';
            preloader.style.opacity = '1';

            // SMART ROUTER: Detect if the user is on a Mobile Device
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth <= 850;

            if (isMobile) {
                // MOBILE: Bypass iframe to prevent Google Drive cookie block. Redirect directly to App.
                mobileLoadingText.style.display = 'block';
                setTimeout(() => {
                    window.location.href = webAppUrl + window.location.search;
                }, 800); // Tiny delay so they see the spinner before jumping
            } else {
                // PC: Load safely inside the iframe
                iframe.style.display = 'block';
                iframe.src = webAppUrl + window.location.search;

                loadTimeout = setTimeout(() => {
                    mobileFallback.style.display = 'block';
                }, 4500);
            }
        }

        function loadDirectMobile() {
            window.location.href = webAppUrl + window.location.search;
        }

        iframe.onload = () => {
            if (iframe.src !== 'about:blank' && iframe.src !== '') {
                clearTimeout(loadTimeout); 
                preloader.style.opacity = '0';
                setTimeout(() => { preloader.style.display = 'none'; }, 500);
            }
        };

        window.addEventListener("message", (event) => {
            if (event.data === "toggleFullscreen") {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => console.log(err));
                } else {
                    if (document.exitFullscreen) { document.exitFullscreen(); }
                }
            } 
            else if (event.data === "logout") {
                localStorage.removeItem('alhuda_logged_in');
                iframe.style.display = 'none';
                iframe.src = 'about:blank';
                mobileFallback.style.display = 'none';
                loginWrapper.style.display = 'flex';
                errorMsg.style.display = 'none'; 
            }
        });

        document.addEventListener("fullscreenchange", () => {
            if (document.fullscreenElement) {
                iframe.contentWindow.postMessage("enteredFullscreen", "*");
            } else {
                iframe.contentWindow.postMessage("exitedFullscreen", "*");
            }
        });
    </script>
</body>
</html>
